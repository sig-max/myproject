name: medical_management_app
description: Medical management mobile app connected to Flask backend.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.2
  shared_preferences: ^2.3.2
  intl: ^0.20.2
  fl_chart: ^1.2.0
  file_picker: ^11.0.2
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  google_fonts: ^8.1.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
