name: medical_management_app
description: Medical management mobile app connected to Flask backend.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  fl_chart: ^0.69.0
  file_picker: ^8.1.2
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
